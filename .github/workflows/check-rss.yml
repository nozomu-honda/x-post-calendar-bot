name: Check X RSS

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check-rss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Check RSS and post to GAS
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
        run: node check-rss.js